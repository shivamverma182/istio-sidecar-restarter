name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build binary
        run: |
          go build -v -o pod-restarter

      - name: Create and push tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          BASE=$(cat VERSION | tr -d '[:space:]')
          LAST=$(git tag -l "${BASE}.*" | sort -t. -k3 -n | tail -1)
          if [ -z "$LAST" ]; then
            PATCH=0
          else
            PATCH=$(echo "$LAST" | awk -F. '{print $NF + 1}')
          fi
          TAG="${BASE}.${PATCH}"
          git tag "$TAG"
          git push origin "$TAG"
